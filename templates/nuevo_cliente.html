{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto animate__animated animate__fadeIn">
    <div class="flex items-center gap-4 mb-8">
        <div class="w-12 h-12 bg-[#08142C] rounded-2xl flex items-center justify-center text-white shadow-lg">
            <i class="fas fa-building text-xl"></i>
        </div>
        <div>
            <h2 class="text-2xl font-black text-[#08142C] font-serif">Registrar Nuevo Cliente</h2>
            <p class="text-xs text-gray-400 uppercase tracking-widest font-bold">Gestión de Directorio Corporativo</p>
        </div>
    </div>

    <div class="bg-white p-8 md:p-10 rounded-[2rem] shadow-xl border border-gray-50 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-[#00A3FF] opacity-5 rounded-full -mr-16 -mt-16"></div>

        <form method="POST" enctype="multipart/form-data" class="space-y-6" id="clientForm">
            {% csrf_token %}
            
            <div class="input-group relative group">
                <label for="id_nombre_empresa" class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1 block">Nombre de la Empresa</label>
                <div class="relative flex items-center">
                    <i class="fas fa-briefcase text-gray-300 absolute left-0 text-sm smooth-transition"></i>
                    <input type="text" id="id_nombre_empresa" name="nombre_empresa" required 
                        class="w-full pl-6 py-2 bg-transparent border-b border-gray-200 text-[#08142C] font-bold focus:outline-none placeholder-gray-300 transition-all" 
                        placeholder="Ej. Lexa Solutions S.A.">
                </div>
                <div class="absolute bottom-0 left-0 h-[2px] w-0 bg-[#00A3FF] transition-all duration-300 group-focus-within:w-full"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="input-group relative group">
                    <label for="id_nombre_contacto" class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1 block">Contacto Principal</label>
                    <div class="relative flex items-center">
                        <i class="fas fa-user-tie text-gray-300 absolute left-0 text-sm smooth-transition"></i>
                        <input type="text" id="id_nombre_contacto" name="nombre_contacto" required 
                            class="w-full pl-6 py-2 bg-transparent border-b border-gray-200 text-[#08142C] font-bold focus:outline-none placeholder-gray-300 transition-all" 
                            placeholder="Nombre del representante">
                    </div>
                    <div class="absolute bottom-0 left-0 h-[2px] w-0 bg-[#00A3FF] transition-all duration-300 group-focus-within:w-full"></div>
                </div>

                <div class="input-group relative group">
                    <label for="id_telefono" class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1 block">Teléfono de Contacto</label>
                    <div class="relative flex items-center">
                        <i class="fas fa-phone text-gray-300 absolute left-0 text-sm smooth-transition"></i>
                        <input type="tel" id="id_telefono" name="telefono" 
                            class="w-full pl-6 py-2 bg-transparent border-b border-gray-200 text-[#08142C] font-bold focus:outline-none placeholder-gray-300 transition-all" 
                            placeholder="+52 ...">
                    </div>
                    <div class="absolute bottom-0 left-0 h-[2px] w-0 bg-[#00A3FF] transition-all duration-300 group-focus-within:w-full"></div>
                </div>
            </div>

            <div class="input-group relative group">
                <label for="id_email" class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1 block">Email Corporativo</label>
                <div class="relative flex items-center">
                    <i class="fas fa-envelope text-gray-300 absolute left-0 text-sm smooth-transition"></i>
                    <input type="email" id="id_email" name="email" required 
                        class="w-full pl-6 py-2 bg-transparent border-b border-gray-200 text-[#08142C] font-bold focus:outline-none placeholder-gray-300 transition-all" 
                        placeholder="contacto@empresa.com">
                </div>
                <div class="absolute bottom-0 left-0 h-[2px] w-0 bg-[#00A3FF] transition-all duration-300 group-focus-within:w-full"></div>
            </div>

            <div class="space-y-3">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block">Logo de Identidad</label>
                <div class="flex items-center gap-5 p-4 border-2 border-dashed border-gray-100 rounded-2xl hover:border-[#00A3FF] transition-colors group">
                    <div id="preview-container" class="w-16 h-16 bg-gray-50 rounded-xl flex items-center justify-center overflow-hidden border border-gray-100">
                        <i id="placeholder-icon" class="fas fa-image text-gray-300 text-xl"></i>
                        <img id="image-preview" src="#" alt="Preview" class="hidden w-full h-full object-cover">
                    </div>
                    <div class="flex-1">
                        <input type="file" id="id_logo" name="logo" accept="image/*" onchange="previewImage(this)"
                            class="block w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-black file:uppercase file:bg-[#08142C] file:text-white hover:file:bg-[#00A3FF] file:cursor-pointer file:transition-all">
                        <p class="text-[9px] text-gray-400 mt-2 italic">Formatos permitidos: PNG, JPG. Máx 2MB.</p>
                    </div>
                </div>
            </div>

            <div class="pt-6 flex flex-col md:flex-row gap-4">
                <button type="submit" class="flex-1 bg-[#08142C] text-white py-4 rounded-xl font-black text-xs tracking-[0.2em] uppercase shadow-lg hover:bg-[#00A3FF] transform hover:-translate-y-1 transition-all duration-300 group">
                    <i class="fas fa-cloud-upload-alt mr-2 group-hover:animate-bounce"></i> Guardar en la Nube
                </button>
                <a href="#" class="px-8 py-4 bg-gray-50 text-gray-400 rounded-xl font-black text-xs tracking-[0.2em] uppercase text-center hover:bg-gray-100 transition-all">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    function previewImage(input) {
        const preview = document.getElementById('image-preview');
        const icon = document.getElementById('placeholder-icon');
        const container = document.getElementById('preview-container');

        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.classList.remove('hidden');
                icon.classList.add('hidden');
                container.classList.add('border-[#00A3FF]');
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
{% endblock %}
