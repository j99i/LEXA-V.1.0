{% extends 'base.html' %}
{% block content %}

<style>
    /* Efecto de entrada para la hoja de papel */
    @keyframes slideUpFade {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }
    .animate-paper {
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* ¡Magia de Impresión! */
    @media print {
        /* Ocultar el Sidebar y todos los botones */
        aside, header, .no-print { 
            display: none !important; 
        }
        /* Ajustar el cuerpo para la impresora */
        body { 
            background-color: white !important; 
            margin: 0; 
            padding: 0; 
        }
        /* Limpiar la hoja simulada para que sea papel real */
        .paper-sheet { 
            box-shadow: none !important; 
            border: none !important; 
            margin: 0 !important; 
            padding: 0 !important;
            max-width: 100% !important;
            min-height: auto !important;
            width: 100% !important;
        }
        /* Expandir el contenedor que tenía scroll */
        .print-container {
            position: relative !important;
            overflow: visible !important;
            height: auto !important;
            background: white !important;
        }
    }
</style>

<div class="max-w-5xl mx-auto h-[calc(100vh-100px)] flex flex-col print-container animate__animated animate__fadeIn">
    
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 no-print shrink-0">
        <div>
            <h2 class="text-2xl font-black text-[#2D1B4B] flex items-center gap-3 font-serif">
                <i class="fas fa-check-circle text-green-500 animate__animated animate__bounceIn"></i> 
                Documento Creado
            </h2>
            <p class="text-sm text-gray-500 mt-1 flex items-center gap-2">
                <i class="fas fa-file-word text-[#A855F7]"></i> {{ doc.nombre_archivo }}
            </p>
        </div>
        
        <div class="flex flex-wrap gap-3 w-full md:w-auto">
            <a href="{% url 'detalle_cliente' doc.cliente.id %}" class="flex-1 md:flex-none text-center bg-white border border-gray-200 text-gray-600 px-5 py-2.5 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-gray-50 hover:text-[#2D1B4B] transition-colors shadow-sm focus:ring-2 focus:ring-gray-200">
                <i class="fas fa-times mr-1"></i> Cerrar
            </a>
            
            <button onclick="window.print()" class="flex-1 md:flex-none text-center bg-[#f8f9fa] border border-gray-200 text-[#2D1B4B] px-5 py-2.5 rounded-xl font-black text-xs uppercase tracking-widest shadow-sm hover:bg-white hover:border-[#A855F7] hover:text-[#A855F7] transition-all focus:ring-2 focus:ring-[#A855F7]/30">
                <i class="fas fa-print mr-1"></i> Imprimir
            </button>

            <a href="{{ doc.archivo.url }}" download="{{ doc.nombre_archivo }}" class="flex-1 md:flex-none text-center bg-[#2D1B4B] text-white px-6 py-2.5 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg hover:bg-[#A855F7] hover:shadow-purple-500/30 transition-all flex items-center justify-center gap-2 focus:ring-4 focus:ring-purple-300">
                <i class="fas fa-download"></i> DESCARGAR WORD
            </a>
        </div>
    </div>

    <div class="flex-1 bg-[#e5e7eb] md:rounded-[2rem] border border-gray-200 overflow-hidden shadow-inner relative print-container">
        <div class="absolute inset-0 overflow-y-auto p-4 md:p-8 custom-scrollbar print-container">
            
            <div class="paper-sheet bg-white shadow-2xl w-full max-w-[21cm] min-h-[29.7cm] mx-auto p-6 md:p-[2.5cm] text-justify prose prose-slate prose-sm md:prose-base max-w-none animate-paper outline outline-1 outline-gray-200">
                
                {{ contenido_html|safe }}
                
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
