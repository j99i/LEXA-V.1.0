{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo Enviado | Lexa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Lato', sans-serif; }
        h1, h2, h3, .brand-font { font-family: 'Playfair Display', serif; }
        
        /* Animación personalizada para el avión de papel */
        @keyframes flyIn {
            0% { transform: translate(-20px, 20px) scale(0.5); opacity: 0; }
            50% { transform: translate(5px, -5px) scale(1.1); opacity: 1; }
            100% { transform: translate(0, 0) scale(1); opacity: 1; }
        }
        .animate-fly-in {
            animation: flyIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        
        /* Pequeña animación de flotación contínua */
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }
        .floating-icon {
            animation: floating 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center bg-gradient-to-br from-[#08142C] to-[#1E1233] p-4">

    <div class="mb-8 text-center animate__animated animate__fadeInDown">
        <img src="{% static 'img/logo.png' %}" class="w-16 h-16 mx-auto mb-2 object-cover bg-white rounded-full p-1 shadow-lg" alt="Logo">
        <h1 class="text-2xl font-black text-white brand-font tracking-wide">LEXA</h1>
    </div>

    <main class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center animate__animated animate__fadeInUp">
        
        <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6 relative overflow-hidden">
            <div class="absolute inset-0 bg-blue-100 rounded-full animate-ping opacity-30"></div>
            <div class="animate-fly-in relative z-10">
                <div class="floating-icon">
                    <i class="fas fa-paper-plane text-4xl text-blue-500"></i>
                </div>
            </div>
        </div>
        
        <h2 class="text-3xl font-black text-[#08142C] mb-4 brand-font">¡Correo Enviado!</h2>
        
        <div class="bg-gray-50 p-5 rounded-2xl text-left mb-8 border border-gray-100 shadow-inner">
            <p class="text-sm text-gray-600 leading-relaxed text-center">
                Hemos enviado las instrucciones para restablecer tu contraseña.
                <br><br>
                <span class="font-bold text-[#00A3FF] block bg-cyan-50 p-2 rounded-lg border border-cyan-100">
                    <i class="fas fa-inbox mr-1"></i> Revisa tu bandeja de entrada o spam.
                </span>
            </p>
        </div>
        
        <a href="{% url 'login' %}" class="block w-full bg-[#08142C] text-white py-4 rounded-xl font-black text-xs tracking-widest uppercase hover:bg-[#00A3FF] transition-all duration-300 shadow-lg hover:shadow-cyan-500/30 hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-cyan-300">
            VOLVER AL INICIO DE SESIÓN
        </a>
        
        <div class="mt-6 text-center">
            <p class="text-[10px] text-gray-400">¿No recibiste el correo? <br> Intenta <a href="{% url 'password_reset' %}" class="font-bold text-[#08142C] hover:text-[#00A3FF] transition-colors underline">solicitarlo de nuevo</a>.</p>
        </div>
        
    </main>

</body>
</html>
