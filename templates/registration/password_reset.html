{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | Lexa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Lato', sans-serif; }
        h1, h2, h3, .brand-font { font-family: 'Playfair Display', serif; }
        
        /* CSS SENIOR: Animaciones nativas para los Blobs que no vienen en el CDN de Tailwind */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center bg-gradient-to-br from-[#08142C] to-[#1E1233] relative overflow-hidden p-4">

    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none -z-10">
        <div class="absolute top-1/4 -left-20 w-96 h-96 bg-[#00A3FF] rounded-full mix-blend-screen filter blur-[80px] opacity-30 animate-blob"></div>
        <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-blue-600 rounded-full mix-blend-screen filter blur-[80px] opacity-20 animate-blob animation-delay-2000"></div>
    </div>

    <div class="mb-8 text-center animate__animated animate__fadeInDown z-10">
        <img src="{% static 'img/logo.png' %}" class="w-16 h-16 mx-auto mb-2 object-cover bg-white rounded-full p-1 shadow-lg" alt="Logo Lexa">
        <h1 class="text-2xl font-black text-white brand-font tracking-wide">LEXA</h1>
    </div>

    <main class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center animate__animated animate__fadeInUp z-10 relative">
        
        <div class="mb-8">
            <div class="w-16 h-16 bg-cyan-50 rounded-full flex items-center justify-center mx-auto mb-4 text-[#00A3FF] shadow-inner">
                <i class="fas fa-lock-open text-2xl" aria-hidden="true"></i>
            </div>
            <h2 class="text-2xl font-black text-[#08142C] brand-font">Recuperar Acceso</h2>
            <p class="text-gray-500 text-sm mt-2 leading-relaxed">Ingresa tu correo corporativo y te enviaremos las instrucciones de inmediato.</p>
        </div>

        <form method="POST" class="space-y-6" id="recovery-form">
            {% csrf_token %}
            
            <div class="relative text-left">
                <label for="id_email" class="text-[10px] font-bold text-gray-400 uppercase tracking-wider ml-1">Correo Electrónico</label>
                <div class="relative mt-1 group">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-[#00A3FF] transition-colors">
                        <i class="fas fa-envelope" aria-hidden="true"></i>
                    </span>
                    <input type="email" name="email" id="id_email" autocomplete="email" autofocus
                        class="w-full pl-11 p-4 bg-gray-50 rounded-xl font-bold text-[#08142C] border border-gray-200 focus:border-[#00A3FF] focus:bg-white focus:ring-4 focus:ring-[#00A3FF]/10 outline-none transition-all shadow-sm" 
                        placeholder="ejemplo@empresa.com" required>
                </div>
                
                {% if form.email.errors %}
                <div class="mt-2 text-xs font-bold text-red-500 bg-red-50 p-2 rounded-lg border border-red-100 flex items-start gap-2">
                    <i class="fas fa-exclamation-circle mt-0.5"></i>
                    <span>{{ form.email.errors.0 }}</span>
                </div>
                {% endif %}
            </div>

            <button type="submit" class="w-full bg-[#08142C] text-white py-4 rounded-xl font-black text-xs tracking-widest hover:bg-[#00A3FF] shadow-lg hover:shadow-cyan-500/30 transition-all duration-300 flex items-center justify-center gap-2 group">
                ENVIAR INSTRUCCIONES
                <i class="fas fa-paper-plane group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100">
            <a href="{% url 'login' %}" class="inline-flex items-center text-xs font-bold text-gray-400 hover:text-[#08142C] transition-colors group">
                <i class="fas fa-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i> Volver al Login
            </a>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const recoveryForm = document.getElementById('recovery-form');
            if(recoveryForm) {
                recoveryForm.addEventListener('submit', function(e) {
                    if (!this.checkValidity()) return;
                    
                    const submitBtn = this.querySelector('button[type="submit"]');
                    if(submitBtn && !submitBtn.dataset.processed) {
                        submitBtn.dataset.processed = "true";
                        
                        const currentWidth = submitBtn.offsetWidth;
                        submitBtn.style.minWidth = currentWidth + 'px';

                        const originalText = submitBtn.innerHTML;
                        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> BUSCANDO CUENTA...';
                        submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
                        
                        setTimeout(() => { submitBtn.disabled = true; }, 0);
                    }
                });
            }
        });
    </script>
</body>
</html>
