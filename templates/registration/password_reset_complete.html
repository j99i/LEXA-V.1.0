{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña Restablecida | Lexa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; }
        h1, h2, h3, .brand-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center bg-gradient-to-br from-[#08142C] to-[#050D1C] p-4">

    <div class="mb-8 text-center animate__animated animate__fadeInDown">
        <img src="{% static 'img/logo.png' %}" class="w-16 h-16 mx-auto mb-2 object-cover bg-white rounded-full p-1 shadow-lg" alt="Logo Lexa">
        <h1 class="text-2xl font-black text-white brand-font tracking-wide">LEXA</h1>
    </div>

    <main class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center animate__animated animate__fadeInUp relative overflow-hidden">
        
        <div class="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6 relative">
            <div class="absolute inset-0 bg-green-100 rounded-full animate-ping opacity-50"></div>
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center relative z-10 animate__animated animate__bounceIn animate__delay-1s">
                <i class="fas fa-check text-4xl text-green-500" aria-hidden="true"></i>
            </div>
        </div>
        
        <h2 class="text-3xl font-black text-[#08142C] mb-3 brand-font">¡Todo Listo!</h2>
        <p class="text-gray-500 text-sm mb-6 leading-relaxed">
            Tu contraseña ha sido actualizada correctamente. Ya puedes ingresar al sistema con tus nuevas credenciales.
        </p>
        
        <a href="{% url 'login' %}" id="btn-login" class="block w-full bg-[#08142C] text-white py-4 rounded-xl font-black tracking-widest uppercase hover:bg-[#00A3FF] transition-all duration-300 shadow-lg hover:shadow-cyan-500/30 hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-cyan-300 mb-4">
            INICIAR SESIÓN
        </a>

        <p class="text-xs text-gray-400 font-bold animate__animated animate__fadeIn animate__delay-2s">
            Serás redirigido en <span id="contador" class="text-[#00A3FF]">5</span> segundos...
        </p>
    </main>

    <script>
        // Lógica de auto-redirección
        document.addEventListener("DOMContentLoaded", () => {
            let segundos = 5;
            const elementoContador = document.getElementById('contador');
            const urlDestino = document.getElementById('btn-login').href;

            const intervalo = setInterval(() => {
                segundos--;
                elementoContador.innerText = segundos;

                if (segundos <= 0) {
                    clearInterval(intervalo);
                    // Efecto visual antes de irse
                    document.body.classList.add('animate__animated', 'animate__fadeOut');
                    setTimeout(() => {
                        window.location.href = urlDestino;
                    }, 500); // Pequeña espera para que termine el fade out
                }
            }, 1000);
        });
    </script>
</body>
</html>
